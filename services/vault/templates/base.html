<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Key Vault{% endblock %} — Open Manus</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface-hover: #22263a;
            --border: #2a2e3f;
            --text: #e4e6f0;
            --text-muted: #8b8fa3;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --danger: #ef4444;
            --danger-hover: #f87171;
            --success: #22c55e;
            --warning: #f59e0b;
            --radius: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 24px 0;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            z-index: 60;  /* MUST be > overlay (55) so links are tappable on mobile */
        }

        .sidebar-brand {
            padding: 0 20px 24px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 16px;
        }

        .sidebar-brand h1 {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-brand p {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .sidebar nav {
            flex: 1;
        }

        .sidebar nav a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.15s;
        }

        .sidebar nav a:hover, .sidebar nav a.active {
            color: var(--text);
            background: var(--surface-hover);
        }

        .sidebar nav a.active {
            border-left: 3px solid var(--accent);
            padding-left: 17px;
        }

        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
        }

        .sidebar-footer a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
        }

        .sidebar-footer a:hover { color: var(--danger); }

        /* Mobile header bar */
        .mobile-header {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            z-index: 70;  /* above sidebar (60) and overlay (55) */
            align-items: center;
            padding: 0 16px;
            gap: 12px;
        }

        .hamburger {
            background: none;
            border: none;
            color: var(--text);
            font-size: 24px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: var(--radius);
            line-height: 1;
        }

        .hamburger:hover { background: var(--surface-hover); }

        .mobile-header .brand {
            font-size: 16px;
            font-weight: 700;
            color: var(--accent);
        }

        /* Mobile sidebar overlay */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 55;
        }

        .sidebar-overlay.active { display: block; }

        /* Main content */
        .main {
            margin-left: 240px;
            flex: 1;
            padding: 32px 40px;
            max-width: 1200px;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-header h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .page-header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 24px;
        }

        .card h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Stats row */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
        }

        .stat-card .label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            text-align: left;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        th {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tr:hover td { background: var(--surface-hover); }

        /* Responsive table wrapper */
        .table-responsive {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* Forms */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 500;
        }

        input[type="text"], input[type="password"], textarea, select {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 16px;
            font-family: inherit;
            -webkit-appearance: none;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        textarea { resize: vertical; min-height: 80px; }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.15s;
            text-decoration: none;
            color: white;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-primary { background: var(--accent); }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-danger { background: var(--danger); }
        .btn-danger:hover { background: var(--danger-hover); }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover { background: var(--surface-hover); }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-success { background: rgba(34, 197, 94, 0.15); color: var(--success); }
        .badge-warning { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
        .badge-danger { background: rgba(239, 68, 68, 0.15); color: var(--danger); }
        .badge-muted { background: rgba(139, 143, 163, 0.15); color: var(--text-muted); }

        /* Grant matrix — desktop */
        .grant-matrix {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .grant-matrix table th:first-child {
            position: sticky;
            left: 0;
            background: var(--surface);
            z-index: 1;
        }

        .grant-matrix table td:first-child {
            position: sticky;
            left: 0;
            background: var(--surface);
            z-index: 1;
            font-weight: 600;
        }

        .grant-matrix input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        /* Grant cards — mobile alternative to the matrix */
        .grant-cards {
            display: none;
        }

        .grant-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
        }

        .grant-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .grant-card-header h4 {
            font-size: 16px;
            font-weight: 600;
            color: var(--accent);
        }

        .grant-card-header .count {
            font-size: 12px;
            color: var(--text-muted);
        }

        .grant-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            min-height: 44px; /* Apple recommended touch target */
        }

        .grant-toggle:last-child {
            border-bottom: none;
        }

        .grant-toggle label {
            font-size: 14px;
            color: var(--text);
            cursor: pointer;
            flex: 1;
            padding-right: 12px;
            word-break: break-all;
        }

        /* Toggle switch for mobile */
        .toggle-switch {
            position: relative;
            width: 48px;
            height: 28px;
            flex-shrink: 0;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--border);
            transition: 0.2s;
            border-radius: 28px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 3px;
            bottom: 3px;
            background: var(--text);
            transition: 0.2s;
            border-radius: 50%;
        }

        .toggle-switch input:checked + .toggle-slider {
            background: var(--accent);
        }

        .toggle-switch input:checked + .toggle-slider:before {
            transform: translateX(20px);
        }

        /* Token display */
        .token-display {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            background: var(--bg);
            padding: 6px 10px;
            border-radius: 4px;
            word-break: break-all;
            color: var(--text-muted);
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            width: 500px;
            max-width: 90vw;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal h3 { margin-bottom: 20px; }

        /* Copy button */
        .copy-btn {
            cursor: pointer;
            padding: 2px 8px;
            font-size: 11px;
            background: var(--surface-hover);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-muted);
        }
        .copy-btn:hover { color: var(--text); }

        /* Flash messages */
        .flash {
            padding: 12px 16px;
            border-radius: var(--radius);
            margin-bottom: 16px;
            font-size: 14px;
        }
        .flash-success { background: rgba(34, 197, 94, 0.1); border: 1px solid var(--success); color: var(--success); }
        .flash-error { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); color: var(--danger); }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        /* ======================================================
           RESPONSIVE — Mobile
           ====================================================== */
        @media (max-width: 768px) {
            /* Hide sidebar, show mobile header */
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.25s ease;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .mobile-header {
                display: flex;
            }

            .main {
                margin-left: 0;
                padding: 72px 16px 24px;
                max-width: 100%;
            }

            .page-header {
                margin-bottom: 20px;
            }

            .page-header h2 {
                font-size: 20px;
            }

            /* Stats grid */
            .stats {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
                margin-bottom: 20px;
            }

            .stat-card {
                padding: 14px;
            }

            .stat-card .value {
                font-size: 22px;
            }

            /* Card padding */
            .card {
                padding: 16px;
                margin-bottom: 16px;
            }

            /* Form rows stack on mobile */
            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }

            /* Table font sizes */
            th, td {
                padding: 10px 8px;
                font-size: 13px;
            }

            /* Grant matrix: hide table, show cards */
            .grant-matrix {
                display: none;
            }

            .grant-cards {
                display: block;
            }

            /* Button sizing for touch */
            .btn {
                padding: 12px 18px;
                font-size: 15px;
            }

            .btn-sm {
                padding: 8px 14px;
                font-size: 13px;
            }

            /* Modal */
            .modal {
                padding: 20px;
                margin: 8px;
                width: calc(100vw - 16px);
                max-width: 100%;
            }

            /* Quick action buttons wrap */
            .quick-actions {
                flex-direction: column;
            }

            .quick-actions .btn {
                width: 100%;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Mobile Header -->
    <div class="mobile-header">
        <button class="hamburger" onclick="toggleSidebar()" aria-label="Menu">&#9776;</button>
        <span class="brand">&#128272; Key Vault</span>
    </div>

    <!-- Mobile overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <div class="layout">
        {% block sidebar %}
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <h1>&#128272; Key Vault</h1>
                <p>Open Manus Agent Team</p>
            </div>
            <nav>
                <a href="/" class="{% if active_page == 'dashboard' %}active{% endif %}" onclick="closeSidebar()">&#128202; Dashboard</a>
                <a href="/keys" class="{% if active_page == 'keys' %}active{% endif %}" onclick="closeSidebar()">&#128273; Keys</a>
                <a href="/grants" class="{% if active_page == 'grants' %}active{% endif %}" onclick="closeSidebar()">&#128274; Access Grants</a>
                <a href="/agents" class="{% if active_page == 'agents' %}active{% endif %}" onclick="closeSidebar()">&#129302; Agents</a>
                <a href="/audit" class="{% if active_page == 'audit' %}active{% endif %}" onclick="closeSidebar()">&#128220; Audit Log</a>
            </nav>
            <div class="sidebar-footer">
                <a href="/logout">&#128682; Sign Out</a>
            </div>
        </aside>
        {% endblock %}

        <main class="main">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const orig = btn.textContent;
                btn.textContent = 'Copied!';
                setTimeout(() => btn.textContent = orig, 1500);
            });
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('active');
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
