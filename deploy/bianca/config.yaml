# ============================================================
# Bianca — Stock Trading & Investment Analyst
# Auto-generated by Open Manus build system
# ============================================================

model:
  default: "x-ai/grok-4.20-multi-agent-beta"
  provider: "openrouter"

agent:
  name: "Bianca"
  description: "Manages stock trading analysis, investment research, cryptocurrency monitoring, and financial decision-making."

terminal:
  backend: "local"
  cwd: "/root/.hermes/workspace"
  timeout: 180
  lifetime_seconds: 600

memory:
  enabled: true
  backend: "core"
  auto_capture: true

compression:
  enabled: true
  threshold: 0.85
  summary_model: "google/gemini-2.5-flash-preview"

tools:
  enabled_toolsets:
    - "web"
    - "terminal"
    - "files"
    - "vision"
    - "browser"
    - "image_gen"
    - "tts"
    - "memory"
    - "cron"
    - "skills"
    - "delegate"
    - "mcp"
    - "todo"
    - "transcription"

delegation:
  max_iterations: 50
  default_toolsets: ["terminal", "file", "web"]

discord:
  require_mention: false

display:
  compact: false
  tool_progress: all
  background_process_notifications: all
  show_reasoning: false

skills:
  directories:
    - "/root/.hermes/skills"
    - "/app/skills"
    - "/app/optional-skills"
