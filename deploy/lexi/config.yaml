# ============================================================
# Lexi — Knowledge & Skill Curator
# Auto-generated by Open Manus build system
# ============================================================
model:
  default: "x-ai/grok-4.20-beta"
  provider: "openrouter"
agent:
  name: "Lexi"
  description: "The dedicated knowledge authority who manages the shared Hive Mind memory system, curates lessons learned, maintains the skill registry, and ensures every agent has the right knowledge and tools for their goals."
terminal:
  backend: "local"
  cwd: "/root/.hermes/workspace"
  timeout: 180
  lifetime_seconds: 600
memory:
  enabled: true
  backend: "core"
  auto_capture: true
compression:
  enabled: true
  threshold: 0.85
  summary_model: "google/gemini-2.5-flash-preview"
tools:
  enabled_toolsets:
    - "terminal"
    - "files"
    - "web"
    - "memory"
    - "cron"
    - "skills"
    - "todo"
delegation:
  max_iterations: 50
  default_toolsets: ["terminal", "file", "web"]
discord:
  require_mention: true
display:
  compact: false
  tool_progress: all
  background_process_notifications: all
  show_reasoning: false
skills:
  directories:
    - "/root/.hermes/skills"
    - "/app/skills"
    - "/app/optional-skills"
